<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contato</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        background: #0b0f14;
        color: #e5e7eb;
      }

      header {
        background: linear-gradient(90deg, #111827, #1f2937);
        color: #fff;
        padding: 20px;
        text-align: center;
      }

      .topo {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        max-width: 1000px;
        margin: 0 auto;
      }

      .menu-horizontal {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .menu-horizontal a {
        color: #f3f4f6;
        text-decoration: none;
        padding: 10px 14px;
        border: 1px solid rgba(243, 244, 246, 0.35);
        border-radius: 999px;
        background: rgba(31, 41, 55, 0.85);
        font-size: 0.95rem;
        font-weight: 600;
      }

      .menu-horizontal a:hover {
        background: rgba(55, 65, 81, 0.95);
      }

      @media (max-width: 760px) {
        .topo {
          flex-direction: column;
        }
      }

      main {
        max-width: 760px;
        margin: 60px auto;
        background: #111827;
        padding: 28px;
        border-radius: 12px;
        border: 1px solid #374151;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin-top: 0;
        color: #f3f4f6;
      }

      .contato-bloco {
        margin-top: 18px;
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 16px;
      }

      .contato-item {
        margin: 8px 0;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="topo">
        <strong>Contato</strong>
        <nav class="menu-horizontal" aria-label="Menu principal">
          <a href="index.html">Início</a>
          <a href="segunda-pagina.html">Segunda página</a>
          <a href="sobre.html">Sobre</a>
          <a href="contato.html">Contato</a>
        </nav>
      </div>
    </header>

    <main>
      <h1>Contato</h1>
      <p>Fale com a nossa equipe para tirar duvidas sobre os conteudos do site.</p>

      <div class="contato-bloco">
        <p class="contato-item"><strong>E-mail:</strong> contato@exemplo.com</p>
        <p class="contato-item"><strong>Telefone:</strong> (11) 99999-0000</p>
        <p class="contato-item"><strong>Horario:</strong> Segunda a sexta, 09h as 18h</p>
      </div>
    </main>
  </body>
</html>
